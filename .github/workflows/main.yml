name: Gashapon Monitor
on:
  workflow_dispatch:
    # ✨ 外部（GAS）からモードを切り替えられるように入力を定義します
    inputs:
      mode:
        description: 'Execution mode'
        required: false
        default: 'check'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # ✨ GASから送られてきた「mode」を環境変数に渡す
          RUN_MODE: ${{ github.event.inputs.mode }}
        run: python main.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # ✨ tracked_products.json も一緒に保存するように追加します
          git add notified_shops.json tracked_products.json
          git commit -m "Update notified shops and tracked products" || echo "No changes to commit"
          git push

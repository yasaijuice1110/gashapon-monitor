name: Discord Gashapon Stock Checker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main_discord.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main
        
        # ✨ ファイルが存在する場合のみ、個別に git add するように変更します
        if [ -f notified_shops_discord.json ]; then git add notified_shops_discord.json; fi
        if [ -f tracked_products_discord.json ]; then git add tracked_products_discord.json; fi
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update Discord history" && git push origin HEAD:main)

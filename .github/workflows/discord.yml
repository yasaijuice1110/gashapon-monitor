name: Discord Gashapon Stock Checker

on:
  schedule:
    - cron: '15 * * * *' # ✨LINEと実行時間をずらして、1時間に1回（毎時15分）実行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run script
      env:
        # ✨今までのリポジトリのSettings -> Secretsに「DISCORD_WEBHOOK_URL」を追加しておいてください
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main_discord.py # ✨新しく作ったDiscord用のファイルを動かす

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main # 競合を防ぐために最新の状態を取り込む
        git add notified_shops.json tracked_products.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update history (Discord)" && git push origin HEAD:main)
